<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YES Connected PSHE Learning Portal</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <!-- Header -->
  <header class="app-header">
    <div class="logo-area">
      <img src="assets/logo.png" alt="YES Connected Logo" class="school-logo" />
      <h1 class="brand-title">YES Connected PSHE Portal</h1>
    </div>
    <div class="user-bar" id="userBar" style="display:none;">
      <span id="welcomeName"></span>
      <button class="btn small logout" onclick="logout()">Logout</button>
    </div>
  </header>

  <!-- Login form -->
  <main id="loginView" class="login-screen">
    <div class="login-box">
      <h2>Sign In to Learn</h2>

      <input type="email" id="email" placeholder="Email" />
      <input type="password" id="password" placeholder="Password" />
<p class="forgot" onclick="resetPassword()">Forgot your password?</p>
      <input type="text" id="teacherCode" placeholder="Teacher Code (optional)" />

      <button class="btn full" onclick="login()">Login / Register</button>
      <p class="note">Students: sign in with your school email and password.<br>
         Teachers: enter the private code to view data.</p>
    </div>
  </main>

  <!-- Student dashboard -->
  <main id="dashboardView" class="dashboard" style="display:none;">
    <section class="banner">
      <h2>Welcome to PSHE Learning </h2>
      <p>Explore core themes and mini‑modules below.</p>
    </section>

    <section id="themesGrid" class="themes-grid">
      <!-- Filled dynamically from lessons.json -->
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>© 2026 YES Connected. All rights reserved.</p>
  </footer>






  <!-- Your app scripts -->
  <script type="module" src="./firebase-config.js"></script>
  <script type="module" src="./app.js"></script>

</body>
</html>
